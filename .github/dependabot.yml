version: 2
updates:
  # Single shared pnpm-lock.yaml for the whole workspace (root + apps/* +
  # packages/* + test/synthetic-*). Scanning "/" alone covers every
  # manifest in it — per-subdirectory entries produced duplicate PRs for
  # the same dependency that then broke on a lockfile/manifest mismatch
  # (2026-07-19 audit: #16/#17/#18 closed for exactly this).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Bundle low-risk minor/patch bumps into one PR per week;
      # major bumps stay ungrouped so each gets individual review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
